<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breast Cancer Classification System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .upload-section {
            padding: 40px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }
        
        .upload-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .file-input-group {
            margin-bottom: 25px;
        }
        
        .file-input-group label {
            display: block;
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-button {
            display: block;
            padding: 15px 20px;
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-input-button:hover {
            background: #e9ecef;
            border-color: #667eea;
        }
        
        .file-input-button.has-files {
            background: #d4edda;
            border-color: #28a745;
            border-style: solid;
        }
        
        .file-count {
            display: inline-block;
            margin-left: 10px;
            padding: 3px 10px;
            background: #667eea;
            color: white;
            border-radius: 15px;
            font-size: 0.9em;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            background: #fff3cd;
            margin: 20px 40px;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results-section {
            padding: 40px;
            display: none;
        }
        
        .results-section.show {
            display: block;
        }
        
        .results-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .results-header h2 {
            color: #495057;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .results-grid {
            display: grid;
            gap: 30px;
        }
        
        .result-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s;
        }
        
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .result-card-header {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-bottom: 2px solid #dee2e6;
        }
        
        .result-card-header h3 {
            color: #495057;
            font-size: 1.3em;
            margin-bottom: 5px;
        }
        
        .filename {
            color: #6c757d;
            font-size: 0.9em;
            font-style: italic;
        }
        
        .result-content {
            padding: 20px;
        }
        
        .predictions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .prediction-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .prediction-box.resnet {
            border-left-color: #28a745;
        }
        
        .prediction-box.vit {
            border-left-color: #667eea;
        }
        
        .model-name {
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .prediction-result {
            font-size: 1.8em;
            font-weight: bold;
            margin: 10px 0;
            text-transform: uppercase;
        }
        
        .prediction-result.benign {
            color: #28a745;
        }
        
        .prediction-result.malignant {
            color: #dc3545;
        }
        
        .prediction-result.normal {
            color: #007bff;
        }
        
        .confidence {
            color: #6c757d;
            font-size: 0.95em;
        }
        
        .probabilities {
            margin-top: 10px;
            font-size: 0.9em;
        }
        
        .prob-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .prob-label {
            text-transform: capitalize;
            color: #495057;
        }
        
        .prob-value {
            font-weight: 600;
            color: #667eea;
        }
        
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .image-box {
            text-align: center;
        }
        
        .image-box h4 {
            color: #495057;
            margin-bottom: 10px;
            font-size: 1em;
        }
        
        .image-box img {
            width: 250px;
            height: 250px;
            object-fit: contain; /* Ensures image is fully visible without stretching */
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            /* This is important for binary masks */
            image-rendering: crisp-edges; 
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: 600;
            margin-left: 5px;
        }
        
        .badge-success {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge-mask {
            background: #cce5ff;
            color: #004085;
        }

        .comparison-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .comparison-section h4 {
            color: #495057;
            margin-bottom: 15px;
        }
        
        .agreement {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1.1em;
        }
        
        .agreement.agree {
            background: #d4edda;
            color: #155724;
        }
        
        .agreement.disagree {
            background: #f8d7da;
            color: #721c24;
        }
        
        @media (max-width: 768px) {
            .predictions-grid {
                grid-template-columns: 1fr;
            }
            
            .images-grid {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Breast Cancer Classification System</h1>
            <p class="subtitle">Advanced AI-Powered Diagnosis with ResNet101 & Vision Transformer</p>
        </header>

        <div class="upload-section">
            <div class="upload-container">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="file-input-group">
                        <label for="images">
                            📤 Select Ultrasound Images 
                            <span class="badge badge-info">Required</span>
                        </label>
                        <div class="file-input-wrapper">
                            <input type="file" id="images" name="images" multiple accept="image/*" required>
                            <label for="images" class="file-input-button" id="imageButton">
                                <span>📁 Choose Images (Multiple)</span>
                                <span id="imageCount" class="file-count" style="display:none;">0</span>
                            </label>
                        </div>
                    </div>

                    <div class="file-input-group">
                        <label for="masks">
                            🎯 Select Ground Truth Masks (Optional)
                        </label>
                        <div class="file-input-wrapper">
                            <input type="file" id="masks" name="masks" multiple accept="image/*">
                            <label for="masks" class="file-input-button" id="maskButton">
                                <span>📁 Choose Masks (Multiple)</span>
                                <span id="maskCount" class="file-count" style="display:none;">0</span>
                            </label>
                        </div>
                        <small style="color: #6c757d; margin-top: 5px; display: block;">
                            💡 Tip: Upload masks in the same order as images for correct pairing
                        </small>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary" id="submitBtn">
                            🚀 Analyze Images
                        </button>
                        <button type="button" class="btn-secondary" id="clearBtn">
                            🗑️ Clear All
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <h3>🔬 Analyzing Images...</h3>
            <p>Please wait while our AI models process your images</p>
        </div>

        <div class="results-section" id="results">
            <div class="results-header">
                <h2>📊 Analysis Results</h2>
                <p id="resultsCount" style="color: #6c757d;"></p>
            </div>
            <div class="results-grid" id="resultsContainer">
                </div>
        </div>
    </div>

    <script>
        // File input handlers
        document.getElementById('images').addEventListener('change', function(e) {
            const count = e.target.files.length;
            const button = document.getElementById('imageButton');
            const countBadge = document.getElementById('imageCount');
            
            if (count > 0) {
                button.classList.add('has-files');
                countBadge.textContent = count;
                countBadge.style.display = 'inline-block';
            } else {
                button.classList.remove('has-files');
                countBadge.style.display = 'none';
            }
        });

        document.getElementById('masks').addEventListener('change', function(e) {
            const count = e.target.files.length;
            const button = document.getElementById('maskButton');
            const countBadge = document.getElementById('maskCount');
            
            if (count > 0) {
                button.classList.add('has-files');
                countBadge.textContent = count;
                countBadge.style.display = 'inline-block';
            } else {
                button.classList.remove('has-files');
                countBadge.style.display = 'none';
            }
        });

        // Form submission
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            const imageFiles = document.getElementById('images').files;
            const maskFiles = document.getElementById('masks').files;
            
            if (imageFiles.length === 0) {
                alert('Please select at least one image');
                return;
            }
            
            // Append images
            for (let i = 0; i < imageFiles.length; i++) {
                formData.append('images', imageFiles[i]);
            }
            
            // Append masks
            for (let i = 0; i < maskFiles.length; i++) {
                formData.append('masks', maskFiles[i]);
            }
            
            // Show loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('results').classList.remove('show');
            document.getElementById('submitBtn').disabled = true;
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data.results);
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error uploading files: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('submitBtn').disabled = false;
            }
        });

        // Display results
        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            const resultsSection = document.getElementById('results');
            const resultsCount = document.getElementById('resultsCount');
            
            container.innerHTML = '';
            resultsCount.textContent = `${results.length} image${results.length > 1 ? 's' : ''} analyzed`;
            
            results.forEach((result, index) => {
                const card = createResultCard(result, index + 1);
                container.appendChild(card);
            });
            
            resultsSection.classList.add('show');
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Create result card
        function createResultCard(result, number) {
            const card = document.createElement('div');
            card.className = 'result-card';
            
            const resnetPred = result.resnet_prediction;
            const vitPred = result.vit_prediction;
            
            const modelsAgree = resnetPred && vitPred && 
                                 resnetPred.class === vitPred.class;
            
            // Dynamically determine the grid columns based on available images
            let imageColumns = 1;
            if (result.mask_path) imageColumns++;
            if (result.gradcam_path) imageColumns++;
            
            card.innerHTML = `
                <div class="result-card-header">
                    <h3>🔬 Image ${number}</h3>
                    <p class="filename">${result.original_filename}</p>
                </div>
                
                <div class="result-content">
                    <div class="predictions-grid">
                        ${resnetPred ? `
                        <div class="prediction-box resnet">
                            <div class="model-name">
                                🤖 ResNet101 
                                <span class="badge badge-success">CNN</span>
                            </div>
                            <div class="prediction-result ${resnetPred.class}">
                                ${resnetPred.class}
                            </div>
                            <div class="confidence">
                                Confidence: ${(resnetPred.confidence * 100).toFixed(1)}%
                            </div>
                            <div class="probabilities">
                                ${Object.entries(resnetPred.probabilities).map(([cls, prob]) => `
                                    <div class="prob-item">
                                        <span class="prob-label">${cls}</span>
                                        <span class="prob-value">${(prob * 100).toFixed(1)}%</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        ` : '<div class="prediction-box"><p>ResNet101 not available</p></div>'}
                        
                        ${vitPred ? `
                        <div class="prediction-box vit">
                            <div class="model-name">
                                🧠 Vision Transformer
                                <span class="badge badge-info">Transformer</span>
                            </div>
                            <div class="prediction-result ${vitPred.class}">
                                ${vitPred.class}
                            </div>
                            <div class="confidence">
                                Confidence: ${(vitPred.confidence * 100).toFixed(1)}%
                            </div>
                            <div class="probabilities">
                                ${Object.entries(vitPred.probabilities).map(([cls, prob]) => `
                                    <div class="prob-item">
                                        <span class="prob-label">${cls}</span>
                                        <span class="prob-value">${(prob * 100).toFixed(1)}%</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        ` : '<div class="prediction-box"><p>ViT not available</p></div>'}
                    </div>
                    
                    ${resnetPred && vitPred ? `
                    <div class="comparison-section">
                        <h4>🔄 Model Comparison</h4>
                        <div class="agreement ${modelsAgree ? 'agree' : 'disagree'}">
                            ${modelsAgree ? 
                                '✅ Both models agree: ' + resnetPred.class.toUpperCase() : 
                                '⚠️ Models disagree - ResNet: ' + resnetPred.class + ', ViT: ' + vitPred.class
                            }
                        </div>
                    </div>
                    ` : ''}
                    
                    <div class="images-grid" style="grid-template-columns: repeat(${imageColumns}, 1fr);">
                        <div class="image-box">
                            <h4>📸 Original Image</h4>
                            <img src="/static/${result.image_path}" alt="Original">
                        </div>
                        
                        ${result.mask_path ? `
                        <div class="image-box">
                            <h4>🎯 Ground Truth <span class="badge badge-mask">Mask</span></h4>
                            <img src="/static/${result.mask_path}" alt="Mask">
                        </div>
                        ` : ''}
                        
                        ${result.gradcam_path ? `
                        <div class="image-box">
                            <h4>🔥 Grad-CAM <span class="badge badge-warning">ViT XAI</span></h4>
                            <img src="/static/${result.gradcam_path}" alt="Grad-CAM">
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            return card;
        }

        // Clear all button
        document.getElementById('clearBtn').addEventListener('click', async function() {
            if (!confirm('Clear all uploaded files and results?')) {
                return;
            }
            
            try {
                const response = await fetch('/clear', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Reset form
                    document.getElementById('uploadForm').reset();
                    document.getElementById('imageButton').classList.remove('has-files');
                    document.getElementById('maskButton').classList.remove('has-files');
                    document.getElementById('imageCount').style.display = 'none';
                    document.getElementById('maskCount').style.display = 'none';
                    
                    // Hide results
                    document.getElementById('results').classList.remove('show');
                    document.getElementById('resultsContainer').innerHTML = '';
                    
                    alert('✅ All files cleared successfully');
                } else {
                    alert('Error clearing files: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
